<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lớp Học Của Cô Linda</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; text-align: center; padding: 20px; }
    #login-screen { background: white; max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    #login-screen input { padding: 12px; font-size: 16px; border: 2px solid #3498DB; border-radius: 8px; width: 80%; margin-bottom: 15px; text-transform: uppercase; text-align: center; font-weight: bold;}
    #login-screen button { background-color: #3498DB; border: none; padding: 12px 25px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; color: white; transition: 0.3s;}
    #login-screen button:hover { background-color: #2980B9; }
    .error-msg { color: #E74C3C; font-size: 15px; margin-top: 15px; font-weight: bold; }
    
    /* Giao diện báo thành công thay cho danh sách 20 Unit */
    #success-screen { display: none; background: white; max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<!-- MÀN HÌNH ĐĂNG NHẬP -->
<div id="login-screen">
    <h2>Chào mừng các con! 🌟</h2>
    <p>Nhập mã học tập của tháng này vào đây nhé:</p>
    <input type="text" id="passkey" placeholder="NHẬP MÃ...">
    <br>
    <button onclick="kiemTraMa()">Vào Lớp</button>
    <p id="thong-bao" class="error-msg"></p>
</div>

<!-- MÀN HÌNH BÁO THÀNH CÔNG -->
<div id="success-screen">
    <h2 style="color: #2ECC71;">✅ Đã mở khóa!</h2>
    <p>Hệ thống đang chuyển con vào bài học...</p>
    <p style="font-size: 14px; color: #7f8c8d; margin-top: 15px;">(Nếu màn hình không tự chuyển, con hãy quay lại Zalo và bấm lại vào link bài học cô gửi nhé!)</p>
</div>

<script>
    // BẢNG MÃ BÍ MẬT (Cô xem mã ở đây để gửi cho học sinh)
    const maBiMat = {
        2026: {
            7: "KV79", 8: "PM34", 9: "ZT82", 10: "LQ15", 11: "WX44", 12: "JN99"
        },
        2027: {
            1: "BC21", 2: "FG88", 3: "DY56", 4: "HK33", 5: "RS77", 6: "MN12",
            7: "VW55", 8: "QP89", 9: "TR41", 10: "XC67", 11: "ZB23", 12: "LK98"
        }
    };

    function hienThiLopHoc() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("success-screen").style.display = "block";
        
        // Chức năng chuyển hướng thẳng vào Unit học sinh vừa bấm
        const linkChoDuyet = sessionStorage.getItem("link_dang_cho");
        if (linkChoDuyet) {
            sessionStorage.removeItem("link_dang_cho"); // Xóa trí nhớ sau khi dùng xong
            window.location.href = linkChoDuyet; // Tự động phóng thẳng vào bài học!
        }
    }

    function kiemTraMa() {
        const inputKey = document.getElementById("passkey").value.toUpperCase().trim();
        const thongBao = document.getElementById("thong-bao");
        
        const thoiGian = new Date();
        const namHienTai = thoiGian.getFullYear();
        const thangHienTai = thoiGian.getMonth() + 1;

        let maHopLe = "";
        if (maBiMat[namHienTai] && maBiMat[namHienTai][thangHienTai]) {
            maHopLe = maBiMat[namHienTai][thangHienTai];
        }

        if (inputKey === maHopLe) {
            sessionStorage.setItem("da_dang_nhap", "true");
            hienThiLopHoc();
        } else {
            thongBao.innerText = "Mã của tháng " + thangHienTai + " không đúng rồi con ơi! ❌";
        }
    }

    // Kiểm tra ngay khi tải trang: Nếu đã đăng nhập trước đó thì mở luôn
    if (sessionStorage.getItem("da_dang_nhap") === "true") {
        hienThiLopHoc();
    }
</script>
</body>
</html>
