<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lớp Học Của Cô Linda</title>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7ff; text-align: center; padding: 20px; }
    #login-screen { background: white; max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    #login-screen input { padding: 12px; font-size: 16px; border: 2px solid #3498DB; border-radius: 8px; width: 80%; margin-bottom: 15px; text-transform: uppercase; text-align: center; font-weight: bold;}
    #login-screen button { background-color: #3498DB; border: none; padding: 12px 25px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; color: white; transition: 0.3s;}
    #login-screen button:hover { background-color: #2980B9; }
    .error-msg { color: #E74C3C; font-size: 15px; margin-top: 15px; font-weight: bold; }
    #main-content { display: none; }
    .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; max-width: 800px; margin: auto; margin-top: 30px;}
    .unit-btn { background-color: #2ECC71; color: white; padding: 15px 10px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 16px; display: block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<!-- MÀN HÌNH ĐĂNG NHẬP -->
<div id="login-screen">
    <h2>Chào mừng các con! 🌟</h2>
    <p>Nhập mã học tập của tháng này vào đây nhé:</p>
    <input type="text" id="passkey" placeholder="NHẬP MÃ...">
    <br>
    <button onclick="kiemTraMa()">Vào Lớp</button>
    <p id="thong-bao" class="error-msg"></p>
</div>

<!-- DANH SÁCH 20 UNIT -->
<div id="main-content">
    <h2>📚 Danh Sách Bài Học 📚</h2>
    <div class="container">
        <!-- Chú ý: Tên thư mục chữ U viết hoa (Unit1, Unit2...) để tránh lỗi link không mở được -->
        <a href="Unit1/" class="unit-btn">Unit 1</a>
        <a href="Unit2/" class="unit-btn">Unit 2</a>
        <a href="Unit3/" class="unit-btn">Unit 3</a>
        <a href="Unit4/" class="unit-btn">Unit 4</a>
        <a href="Unit5/" class="unit-btn">Unit 5</a>
        <a href="Unit6/" class="unit-btn">Unit 6</a>
        <a href="Unit7/" class="unit-btn">Unit 7</a>
        <a href="Unit8/" class="unit-btn">Unit 8</a>
        <a href="Unit9/" class="unit-btn">Unit 9</a>
        <a href="Unit10/" class="unit-btn">Unit 10</a>
        <a href="Unit11/" class="unit-btn">Unit 11</a>
        <a href="Unit12/" class="unit-btn">Unit 12</a>
        <a href="Unit13/" class="unit-btn">Unit 13</a>
        <a href="Unit14/" class="unit-btn">Unit 14</a>
        <a href="Unit15/" class="unit-btn">Unit 15</a>
        <a href="Unit16/" class="unit-btn">Unit 16</a>
        <a href="Unit17/" class="unit-btn">Unit 17</a>
        <a href="Unit18/" class="unit-btn">Unit 18</a>
        <a href="Unit19/" class="unit-btn">Unit 19</a>
        <a href="Unit20/" class="unit-btn">Unit 20</a>
    </div>
</div>

<script>
    // BẢNG MÃ BÍ MẬT THEO NĂM VÀ THÁNG (Cô xem mã ở đây để gửi cho học sinh)
    const maBiMat = {
        2026: {
            7: "KV79", 8: "PM34", 9: "ZT82", 10: "LQ15", 11: "WX44", 12: "JN99"
        },
        2027: {
            1: "BC21", 2: "FG88", 3: "DY56", 4: "HK33", 5: "RS77", 6: "MN12",
            7: "VW55", 8: "QP89", 9: "TR41", 10: "XC67", 11: "ZB23", 12: "LK98"
        }
    };

    function hienThiLopHoc() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("main-content").style.display = "block";
        
        // Chức năng chuyển hướng thẳng vào Unit nếu học sinh bấm từ link gửi riêng
        const linkChoDuyet = sessionStorage.getItem("link_dang_cho");
        if (linkChoDuyet) {
            sessionStorage.removeItem("link_dang_cho"); // Xóa trí nhớ
            window.location.href = linkChoDuyet; // Chuyển thẳng vào bài học
        }
    }

    function kiemTraMa() {
        const inputKey = document.getElementById("passkey").value.toUpperCase().trim();
        const thongBao = document.getElementById("thong-bao");
        
        const thoiGian = new Date();
        const namHienTai = thoiGian.getFullYear();
        const thangHienTai = thoiGian.getMonth() + 1;

        // Lấy đúng mã của tháng và năm hiện tại
        let maHopLe = "";
        if (maBiMat[namHienTai] && maBiMat[namHienTai][thangHienTai]) {
            maHopLe = maBiMat[namHienTai][thangHienTai];
        }

        if (inputKey === maHopLe) {
            sessionStorage.setItem("da_dang_nhap", "true");
            hienThiLopHoc();
        } else {
            thongBao.innerText = "Mã của tháng " + thangHienTai + " không đúng rồi con ơi! ❌";
        }
    }

    // Kiểm tra ngay khi tải trang: Nếu đã đăng nhập trước đó thì mở lớp luôn
    if (sessionStorage.getItem("da_dang_nhap") === "true") {
        hienThiLopHoc();
    }
</script>
</body>
</html>
